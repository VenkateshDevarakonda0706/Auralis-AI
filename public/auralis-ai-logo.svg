<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff1493;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff69b4;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <circle cx="100" cy="100" r="98" fill="url(#bgGradient)" stroke="#ff1493" stroke-width="2"/>
  
  <!-- Outer Ring -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#ff1493" stroke-width="1" opacity="0.3"/>
  
  <!-- Main Voice Icon Group -->
  <g transform="translate(100, 100)">
    <!-- Microphone Capsule (top) -->
    <ellipse cx="0" cy="-25" rx="16" ry="20" fill="none" stroke="url(#accentGradient)" stroke-width="2.5"/>
    <circle cx="0" cy="-25" r="10" fill="url(#accentGradient)" opacity="0.15"/>
    
    <!-- Microphone Stand -->
    <path d="M -12 -5 L -12 15 Q -12 22 -5 22 L 5 22 Q 12 22 12 15 L 12 -5" 
          fill="none" stroke="url(#accentGradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Sound Waves - Left -->
    <path d="M -35 -10 Q -42 -10 -42 0 Q -42 10 -35 10" 
          fill="none" stroke="#ff1493" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <path d="M -48 -18 Q -58 -18 -58 0 Q -58 18 -48 18" 
          fill="none" stroke="#ff1493" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    
    <!-- Sound Waves - Right -->
    <path d="M 35 -10 Q 42 -10 42 0 Q 42 10 35 10" 
          fill="none" stroke="#ff1493" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <path d="M 48 -18 Q 58 -18 58 0 Q 58 18 48 18" 
          fill="none" stroke="#ff1493" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    
    <!-- AI Symbol (bottom - stylized circuit) -->
    <circle cx="-15" cy="35" r="4" fill="url(#accentGradient)"/>
    <circle cx="0" cy="45" r="4" fill="url(#accentGradient)"/>
    <circle cx="15" cy="35" r="4" fill="url(#accentGradient)"/>
    
    <line x1="-15" y1="35" x2="0" y2="45" stroke="#ff1493" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="45" x2="15" y2="35" stroke="#ff1493" stroke-width="1.5" opacity="0.6"/>
    <line x1="-15" y1="35" x2="15" y2="35" stroke="#ff1493" stroke-width="1.5" opacity="0.4"/>
  </g>
  
  <!-- Pulse Animation Ring -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#ff1493" stroke-width="1" opacity="0.2">
    <animate attributeName="r" from="85" to="105" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.4" to="0" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Corner Accents -->
  <circle cx="20" cy="20" r="2" fill="#ff1493" opacity="0.5"/>
  <circle cx="180" cy="20" r="2" fill="#ff1493" opacity="0.5"/>
  <circle cx="20" cy="180" r="2" fill="#ff1493" opacity="0.5"/>
  <circle cx="180" cy="180" r="2" fill="#ff1493" opacity="0.5"/>
</svg>